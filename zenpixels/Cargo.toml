[package]
name = "zenpixels"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
license = "Apache-2.0 OR MIT"
description = "Pixel format interchange types for zen* codecs"
categories = ["multimedia::images"]
keywords = ["image", "pixel", "format", "descriptor", "codec"]
repository = "https://github.com/imazen/zenpixels"

[features]
default = ["std"]
std = []
planar = []
rgb = ["dep:rgb"]
imgref = ["dep:imgref", "rgb"]
# Convenience alias: enables both rgb Pixel impls and imgref interop.
buffer = ["rgb", "imgref"]

[dependencies]
bytemuck = { version = "1.21", default-features = false, features = ["extern_crate_alloc", "derive"] }
rgb = { version = "0.8", default-features = false, features = ["bytemuck", "unstable-experimental"], optional = true }
imgref = { version = "1.12", optional = true }

[dev-dependencies]
imgref = "1.12"
rgb = { version = "0.8", default-features = false, features = ["bytemuck", "unstable-experimental"] }
