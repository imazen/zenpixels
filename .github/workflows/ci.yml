name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CI: true

jobs:
  # ==========================================================================
  # Native testing (6-platform matrix)
  # ==========================================================================
  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, name: Linux x64 }
          - { os: ubuntu-24.04-arm, name: Linux aarch64 }
          - { os: macos-latest, name: macOS arm64 }
          - { os: macos-26-intel, name: macOS x64 }
          - { os: windows-latest, name: Windows x64 }
          - { os: windows-11-arm, name: Windows arm64 }
    steps:
      - uses: actions/checkout@v6

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Patch path deps to git refs
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./\.\./linear-srgb", ||g' \
            -e 's|path = "\.\./\.\./ultrahdr/ultrahdr-core", ||g' \
            -e 's|path = "\.\./\.\./zenresize"|git = "https://github.com/imazen/zenresize"|g' \
            zenpixels-convert/Cargo.toml > zenpixels-convert/Cargo.toml.ci && \
            mv zenpixels-convert/Cargo.toml.ci zenpixels-convert/Cargo.toml

      - name: Test (workspace)
        run: cargo test --workspace

      - name: Check no_std (zenpixels)
        run: cargo check -p zenpixels --no-default-features

  # ==========================================================================
  # Cross-compiled 32-bit testing (i686 via QEMU)
  # ==========================================================================
  test-i686:
    name: Test i686
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: cross-i686

      - name: Patch path deps to git refs
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./\.\./linear-srgb", ||g' \
            -e 's|path = "\.\./\.\./ultrahdr/ultrahdr-core", ||g' \
            -e 's|path = "\.\./\.\./zenresize"|git = "https://github.com/imazen/zenresize"|g' \
            zenpixels-convert/Cargo.toml > zenpixels-convert/Cargo.toml.ci && \
            mv zenpixels-convert/Cargo.toml.ci zenpixels-convert/Cargo.toml

      - name: Test (i686/QEMU)
        run: cross test --workspace --target i686-unknown-linux-gnu

  # ==========================================================================
  # WASM check
  # ==========================================================================
  wasm:
    name: WASM (wasm32-wasip1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Patch path deps to git refs
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./\.\./linear-srgb", ||g' \
            -e 's|path = "\.\./\.\./ultrahdr/ultrahdr-core", ||g' \
            -e 's|path = "\.\./\.\./zenresize"|git = "https://github.com/imazen/zenresize"|g' \
            zenpixels-convert/Cargo.toml > zenpixels-convert/Cargo.toml.ci && \
            mv zenpixels-convert/Cargo.toml.ci zenpixels-convert/Cargo.toml

      - name: Check WASM (no_std)
        run: cargo check --workspace --target wasm32-wasip1 --no-default-features

  # ==========================================================================
  # Clippy
  # ==========================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Patch path deps to git refs
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./\.\./linear-srgb", ||g' \
            -e 's|path = "\.\./\.\./ultrahdr/ultrahdr-core", ||g' \
            -e 's|path = "\.\./\.\./zenresize"|git = "https://github.com/imazen/zenresize"|g' \
            zenpixels-convert/Cargo.toml > zenpixels-convert/Cargo.toml.ci && \
            mv zenpixels-convert/Cargo.toml.ci zenpixels-convert/Cargo.toml

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ==========================================================================
  # Format check
  # ==========================================================================
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --all -- --check

  # ==========================================================================
  # MSRV check
  # ==========================================================================
  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Patch path deps to git refs
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./\.\./linear-srgb", ||g' \
            -e 's|path = "\.\./\.\./ultrahdr/ultrahdr-core", ||g' \
            -e 's|path = "\.\./\.\./zenresize"|git = "https://github.com/imazen/zenresize"|g' \
            zenpixels-convert/Cargo.toml > zenpixels-convert/Cargo.toml.ci && \
            mv zenpixels-convert/Cargo.toml.ci zenpixels-convert/Cargo.toml

      - name: Check MSRV
        run: cargo hack check --workspace --rust-version

  # ==========================================================================
  # Code coverage
  # ==========================================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Patch path deps to git refs
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./\.\./linear-srgb", ||g' \
            -e 's|path = "\.\./\.\./ultrahdr/ultrahdr-core", ||g' \
            -e 's|path = "\.\./\.\./zenresize"|git = "https://github.com/imazen/zenresize"|g' \
            zenpixels-convert/Cargo.toml > zenpixels-convert/Cargo.toml.ci && \
            mv zenpixels-convert/Cargo.toml.ci zenpixels-convert/Cargo.toml

      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
