[package]
name = "zenpixels-convert"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
license = "Apache-2.0 OR MIT"
description = "Transfer-function-aware pixel conversion, gamut mapping, and codec format negotiation for zenpixels"
categories = ["multimedia::images"]
keywords = ["image", "pixel", "conversion", "srgb", "codec"]
repository = "https://github.com/imazen/zenpixels"

[features]
default = ["std"]
std = ["zenpixels/std", "linear-srgb/std"]
buffer = ["zenpixels/buffer", "dep:rgb"]
rgb = ["zenpixels/rgb"]
imgref = ["zenpixels/imgref", "rgb"]
planar = ["zenpixels/planar"]
codec = ["buffer", "dep:enough"]
hdr-ultrahdr = ["dep:ultrahdr-core"]
hdr-gainforge = ["dep:gainforge"]

[dependencies]
zenpixels = { path = "../zenpixels", default-features = false }
linear-srgb = { version = "0.5", path = "../../linear-srgb", default-features = false }
bytemuck = { version = "1.21", default-features = false, features = ["extern_crate_alloc", "derive"] }
rgb = { version = "0.8", default-features = false, features = ["bytemuck"], optional = true }
enough = { version = "0.4", optional = true }
ultrahdr-core = { version = "0.2", path = "../../ultrahdr/ultrahdr-core", optional = true }
gainforge = { version = "0.4", optional = true }

[lints.rust.unexpected_cfgs]
level = "warn"
check-cfg = ['cfg(feature, values("zenresize"))']

[dev-dependencies]
zenpixels = { path = "../zenpixels", features = ["buffer", "planar", "rgb", "imgref"] }
half = "2"
# zenresize temporarily removed - path dep not available in worktree
# zenresize = { path = "../../zenresize", default-features = false, features = ["std"] }
