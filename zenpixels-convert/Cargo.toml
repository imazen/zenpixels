[package]
name = "zenpixels-convert"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
readme = "../README.md"
repository.workspace = true
categories.workspace = true
description = "Transfer-function-aware pixel conversion, gamut mapping, and codec format negotiation for zenpixels"
keywords = ["image", "pixel", "conversion", "srgb", "codec"]

[features]
default = ["std"]
std = ["zenpixels/std", "linear-srgb/std", "garb/std"]
rgb = ["zenpixels/rgb", "dep:rgb"]
imgref = ["zenpixels/imgref", "rgb"]
planar = ["zenpixels/planar"]
pipeline = []
cms-moxcms = ["std", "dep:moxcms"]

[dependencies]
zenpixels = { version = "0.2.0", path = "../zenpixels", default-features = false }
linear-srgb = { version = "0.7", path = "../../linear-srgb", default-features = false, features = ["transfer"] }
bytemuck = { version = "1.21", default-features = false, features = ["extern_crate_alloc", "derive"] }
rgb = { version = "0.8", default-features = false, features = ["bytemuck"], optional = true }
garb = { version = "0.2.4", path = "/home/lilith/work/garb", default-features = false, features = ["experimental"] }
whereat = { version = "0.1.4", default-features = false }
moxcms = { version = "0.8", optional = true }

[dev-dependencies]
zenpixels = { version = "0.2.0", path = "../zenpixels", features = ["planar", "imgref"] }
zenpixels-convert = { path = ".", features = ["pipeline", "imgref", "cms-moxcms"] }
half = "2"
palette = "0.7"

